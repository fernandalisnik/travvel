<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travvel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>Travvel</h1>
  <p id="status">Conectando...</p>

  <script>
    const SUPABASE_URL = 'https://howtnxexajgsxqkgrvob.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_DGjhq6UTWECVioYiKOVywQ_MDNHikf0'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    async function iniciar() {
      const { error: authError } = await db.auth.signInAnonymously()
      if (authError) {
        document.getElementById('status').textContent = 'Erro de auth: ' + authError.message
        return
      }
      const { data, error } = await db.from('albuns').select('id').limit(1)
      if (error) {
        document.getElementById('status').textContent = 'Erro: ' + error.message
      } else {
        document.getElementById('status').textContent = 'Conectado ao Supabase!'
      }
    }

    iniciar()
  </script>

</body>
</html>
