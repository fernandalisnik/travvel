<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travvel</title>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1E2D6B;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      width: 100%;
    }
    h1 {
      font-family: 'Passion One', sans-serif;
      font-size: 48px;
      color: #1E2D6B;
      letter-spacing: 2px;
    }
    .dot { color: #E8632A; }
    p {
      margin-top: 12px;
      font-size: 14px;
      color: #888;
    }
    .status {
      margin-top: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
    }
    .status.ok { background: #EAF3DE; color: #3B6D11; }
    .status.erro { background: #FAECE7; color: #993C1D; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Travvel<span class="dot">.</span></h1>
    <p>álbum de viagem compartilhado</p>
    <div class="status" id="status">conectando...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://howtnxexajgsxqkgrvob.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_DGjhq6UTWECVioYiKOVywQ_MDNHikf0'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    async function iniciar() {
      const { error: authError } = await db.auth.signInAnonymously()
      if (authError) {
        const el = document.getElementById('status')
        el.textContent = 'erro de conexão'
        el.className = 'status erro'
        return
      }
      const { error } = await db.from('albuns').select('id').limit(1)
      const el = document.getElementById('status')
      if (error) {
        el.textContent = 'erro: ' + error.message
        el.className = 'status erro'
      } else {
        el.textContent = 'banco conectado'
        el.className = 'status ok'
      }
    }

    iniciar()
  </script>
</body>
</html>
